{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="page-header">
        <div class="breadcrumbs">
            <a href="{{ url_for('index') }}" class="breadcrumb-link">Главная</a>
            <span class="breadcrumb-separator">&gt;</span>
            <span class="breadcrumb-current">Книги</span>
        </div>
        <h1 class="page-title">Переводы на русский</h1>
        <p style="color: #aaa; margin-top: 10px;">Все официально выпущенные произведения цикла "Ведьмак" существуют и на русском языке.</p>
    </div>

    <div class="filter-tabs" style="display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border-gold); padding-bottom: 10px;">
        <a href="#" class="filter-tab active" data-type="all" style="color: var(--text-gold); text-decoration: none; font-weight: 700;">Все</a>
        <a href="#" class="filter-tab" data-type="Сборник рассказов" style="color: #aaa; text-decoration: none;">Сборники</a>
        <a href="#" class="filter-tab" data-type="Роман" style="color: #aaa; text-decoration: none;">Романы</a>
    </div>

    <div class="books-grid">
        {% for book in books %}
        <a href="{{ url_for('book_detail', id=book[0]) }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="book-card" data-type="{{ book[2] }}" style="background-color: #1f1f1f; border-radius: 4px; overflow: hidden; transition: 0.3s;">
                <div class="book-cover" style="height: 350px; background-image: url('{{ book[4] }}'); background-size: cover; background-position: center;"></div>
                <div class="book-info" style="padding: 15px; text-align: center;">
                    <h3 style="color: var(--text-gold); font-size: 1rem; margin: 0 0 5px 0;">"{{ book[1] }}"</h3>
                    <p style="color: #aaa; font-size: 0.85rem; margin: 0;">{{ book[2] }}</p>
                    <p style="color: #888; font-size: 0.8rem; margin: 0;">{{ book[3] }}</p>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>

<script>
document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.filter-tab').forEach(t => t.style.color = '#aaa');
        this.classList.add('active');
        this.style.color = 'var(--text-gold)';
        
        const type = this.dataset.type;
        document.querySelectorAll('.book-card').forEach(card => {
            if (type === 'all') {
                card.style.display = 'block';
            } else {
                card.style.display = card.dataset.type === type ? 'block' : 'none';
            }
        });
    });
});
</script>
{% endblock %}
