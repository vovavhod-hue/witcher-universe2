{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="page-header">
        <div class="breadcrumbs">
            <a href="{{ url_for('index') }}" class="breadcrumb-link">Главная</a>
            <span class="breadcrumb-separator">&gt;</span>
            <span class="breadcrumb-current">Аниме</span>
        </div>
        <h1 class="page-title">Аниме</h1>
    </div>

    <div class="anime-grid">
        <div class="anime-card" style="background-color: #1f1f1f; border-radius: 4px; overflow: hidden;">
            <div class="anime-poster" style="height: 300px; background-color: #333; background-image: url('/static/images/anime_witcher1.jpg'); background-size: cover; background-position: center;"></div>
            <div class="anime-info" style="padding: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="color: var(--text-gold); font-size: 1rem; margin: 0;">
                        <a href="{{ url_for('anime_detail', id=1) }}" style="text-decoration: none; color: inherit;">Ведьмак: Кошмар волка</a>
                    </h3>
                    <span style="color: var(--text-gold); font-size: 1.1rem; font-weight: 700;">6.9</span>
                </div>
                <div style="color: #aaa; font-size: 0.85rem; margin-top: 4px;">США</div>
            </div>
        </div>

        <div class="anime-card" style="background-color: #1f1f1f; border-radius: 4px; overflow: hidden;">
            <div class="anime-poster" style="height: 300px; background-color: #333; background-image: url('/static/images/anime_witcher2.jpg'); background-size: cover; background-position: center;"></div>
            <div class="anime-info" style="padding: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="color: var(--text-gold); font-size: 1rem; margin: 0;">
                        <a href="{{ url_for('anime_detail', id=2) }}" style="text-decoration: none; color: inherit;">Ведьмак: Сирены глубин</a>
                    </h3>
                    <span style="color: var(--text-gold); font-size: 1.1rem; font-weight: 700;">6.2</span>
                </div>
                <div style="color: #aaa; font-size: 0.85rem; margin-top: 4px;">Польша, Корея Южная, США</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
